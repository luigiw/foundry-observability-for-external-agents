AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: LangGraph Customer Support Multi-Agent System

Parameters:
  ApplicationInsightsConnectionString:
    Type: String
    Description: Azure Application Insights connection string for tracing
    Default: "InstrumentationKey=320c6a3f-989f-4303-8bbe-f7682ddec3bc;IngestionEndpoint=https://eastus2-3.in.applicationinsights.azure.com/;LiveEndpoint=https://eastus2.livediagnostics.monitor.azure.com/;ApplicationId=e93e55ce-5468-4d9c-a532-8887871161ed"

Globals:
  Function:
    Timeout: 300  # 5 minutes for longer conversations
    MemorySize: 512
    Runtime: python3.11
    Architectures:
      - arm64
    Environment:
      Variables:
        AWS_LWA_INVOKE_MODE: RESPONSE_STREAM
        APPLICATIONINSIGHTS_CONNECTION_STRING: !Ref ApplicationInsightsConnectionString
        OTEL_SERVICE_NAME: aws-langgraph-customer-support

Resources:
  # Lambda Execution Role with Bedrock access
  CustomerSupportFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: langgraph-customer-support-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0
                  - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0

  # Lambda Function
  CustomerSupportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: langgraph-customer-support
      CodeUri: .
      Handler: src.lambda_handler.handler
      Role: !GetAtt CustomerSupportFunctionRole.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /support
            Method: POST
            RestApiId: !Ref CustomerSupportApi

  # API Gateway
  CustomerSupportApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: langgraph-customer-support-api
      StageName: prod
      Auth:
        ApiKeyRequired: true
      Cors:
        AllowMethods: "'POST, OPTIONS'"
        AllowHeaders: "'Content-Type, x-api-key'"
        AllowOrigin: "'*'"

  # API Key
  CustomerSupportApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: CustomerSupportApiprodStage
    Properties:
      Name: langgraph-customer-support-api-key
      Enabled: true
      StageKeys:
        - RestApiId: !Ref CustomerSupportApi
          StageName: prod

  # Usage Plan (required to associate API key with API)
  CustomerSupportUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: CustomerSupportApiprodStage
    Properties:
      UsagePlanName: langgraph-customer-support-usage-plan
      ApiStages:
        - ApiId: !Ref CustomerSupportApi
          Stage: prod
      Throttle:
        RateLimit: 10
        BurstLimit: 5

  CustomerSupportUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref CustomerSupportApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref CustomerSupportUsagePlan

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${CustomerSupportApi}.execute-api.${AWS::Region}.amazonaws.com/prod/support"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt CustomerSupportFunction.Arn
  ApiKeyId:
    Description: API Key ID (use 'aws apigateway get-api-key --api-key <id> --include-value' to retrieve the value)
    Value: !Ref CustomerSupportApiKey
